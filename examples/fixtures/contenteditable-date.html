<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fixture: contenteditable + date</title>
  </head>
  <body>
    <div id="editor" contenteditable="true"></div>

    <label for="d">Start date</label>
    <input id="d" type="date" />

    <label for="dt">Start datetime</label>
    <input id="dt" type="datetime-local" />

    <fieldset>
      <legend>Split date</legend>
      <input id="month" inputmode="numeric" />
      <input id="day" inputmode="numeric" />
      <input id="year" inputmode="numeric" />
    </fieldset>
  </body>
</html>
