<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exempliphai - Local Profile (Privacy Mode)</title>
    <link rel="stylesheet" href="local_pages.css" />
  </head>
  <body>
    <div class="page">
      <div class="card" style="margin-bottom: 14px;">
        <div class="h1">Local Profile (Privacy Mode)</div>
        <div class="p">
          Stores your autofill profile as JSON in <span class="code">chrome.storage.local</span> under
          <span class="code">LOCAL_PROFILE</span>. Nothing is synced.
        </div>

        <div class="row" style="justify-content: space-between;">
          <div class="row">
            <button class="btn" id="load">Load</button>
            <button class="btn primary" id="save">Save</button>
            <button class="btn danger" id="clear">Clear</button>
            <span class="badge" id="status">Ready</span>
          </div>
          <div class="row">
            <a class="btn" href="local_ats_config.html" style="text-decoration:none;">ATS selectors override</a>
          </div>
        </div>

        <div class="tabs" id="tabs"></div>
      </div>

      <div id="panel" class="card"></div>

      <div class="p" style="margin-top: 14px;">
        Tip: The autofiller is Simplify-compatible. Use keys like <span class="code">first_name</span>,
        <span class="code">work_auth_us</span>, <span class="code">linkedin</span>, etc.
      </div>
    </div>

    <script src="local_profile.js"></script>
  </body>
</html>
